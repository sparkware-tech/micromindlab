<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MicroMind Lab</title>
<link rel="icon" type="image/png" href="assests/img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="assests/css/lms.css" />
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-logo"><i data-lucide="graduation-cap"></i></div>
  <div class="loader-title">MicroMind<span> Lab</span></div>
  <div class="loader-msg" id="loader-msg">Loading data from Database…</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-error" id="loader-error"></div>
  <button class="loader-retry" id="loader-retry" onclick="location.reload()">Retry</button>
</div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon-wrap"><img src="assests/img/logo.png" style="width:100%;" alt="Logo"/></div>
      <h1>MicroMind<span> Lab</span></h1>
      <p>The Way to Smart Future</p>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter your username" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter your password"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">
      <i data-lucide="alert-circle"></i> Invalid username or password. Please try again.
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-mark"><img src="assests/img/logo.png" style="width:100%;" alt="Logo"/></div>
        MicroMind<span> Lab</span>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">
        <i data-lucide="log-out"></i> Sign Out
      </button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <button class="topbar-back" id="topbar-back" onclick="goBack()">
        <i data-lucide="arrow-left"></i> Back
      </button>
      <h2 id="topbar-title">Dashboard</h2>
      <div class="sidebar-user">
        <div class="user-avatar"><i data-lucide="user"></i></div>
        <div>
          <div class="uname" id="sb-name"></div>
          <div class="urole" id="sb-role"></div>
        </div>
      </div>
      <span class="breadcrumb" id="topbar-crumb"></span>
    </div>

    <!-- STUDENT DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="dash-greeting">
        <h1>Welcome back, <span id="dash-name"></span></h1>
        <p><i data-lucide="calendar"></i><span id="dash-date"></span></p>
      </div>
      <div class="stats-grid" id="dash-stats"></div>
      <div class="section-title">
        <span class="stitle-icon"><i data-lucide="book-open"></i></span> My Courses
      </div>
      <div class="courses-grid" id="dash-courses"></div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div class="page" id="page-admin-dashboard">
      <div class="dash-greeting">
        <h1>Admin Panel</h1>
        <p><i data-lucide="calendar"></i><span id="admin-date"></span></p>
      </div>
      <div class="stats-grid" id="admin-stats"></div>
      <div class="section-title">
        <span class="stitle-icon"><i data-lucide="book-open"></i></span> All Courses
      </div>
      <div class="courses-grid" id="admin-courses"></div>
      <div class="admin-section">
        <div class="section-title">
          <span class="stitle-icon"><i data-lucide="users"></i></span> All Students &amp; Enrolled Courses
        </div>
        <div class="admin-search-bar">
          <div class="search-wrap">
            <span class="search-icon"><i data-lucide="search"></i></span>
            <input type="text" id="student-search" placeholder="Search students by name or username…" oninput="filterStudents()"/>
          </div>
        </div>
        <div class="students-table-wrap">
          <table class="students-table">
            <thead><tr><th>Student</th><th>Enrolled Courses</th><th>Count</th></tr></thead>
            <tbody id="students-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- COURSE PAGE -->
    <div class="page" id="page-course">
      <div class="course-hero" id="course-hero"></div>
      <div class="days-list" id="days-list"></div>
    </div>

    <!-- CONTENT VIEWER -->
    <div class="page" id="page-content">
      <div class="content-viewer fade-in" id="content-viewer"></div>
    </div>
  </div>
</div>

<script src="assests/constant/lms.js"></script>
<script>
const COURSE_ICONS = ['cpu','flask-conical','globe','layers','code-2','atom','bar-chart-2','zap','database','settings-2'];
const FILE_ICONS   = { video:'play-circle', note:'file-text', link:'link-2', pdf:'file', image:'image' };

function icon(name) { return `<i data-lucide="${name}"></i>`; }
function courseIcon(idx) { return COURSE_ICONS[idx % COURSE_ICONS.length]; }
function render() { if (window.lucide) lucide.createIcons(); }

let currentUser = null, isAdmin = false, currentCourse = null, pageHistory = [], quizScores = {};

(async function init() {
  const loaderEl  = document.getElementById('loading-screen');
  const loaderMsg = document.getElementById('loader-msg');
  const loaderErr = document.getElementById('loader-error');
  const loaderBtn = document.getElementById('loader-retry');
  try {
    loaderMsg.textContent = 'Connecting to Database…';
    await LMS_DATA_PROMISE;
    loaderMsg.textContent = 'Data loaded';
    await new Promise(r => setTimeout(r, 400));
    loaderEl.style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    render();
    document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  } catch(err) {
    loaderMsg.style.display = 'none';
    document.querySelector('.loader-bar-wrap').style.display = 'none';
    loaderErr.style.display = 'block';
    loaderErr.innerHTML = `<strong>Failed to load data from Database.</strong><br><br>Make sure you have:<br>1. Created your Google Sheet with the required tabs.<br>2. Published it to web as CSV.<br>3. Pasted the CSV URLs into <code>lms.js</code>.<br><br><em style="font-size:.8em;opacity:.7;">${err.message}</em>`;
    loaderBtn.style.display = 'inline-block';
  }
})();

function doLogin() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  if (u === LMS_DATA.admin.username && p === LMS_DATA.admin.password) {
    currentUser = { ...LMS_DATA.admin, isAdmin:true }; isAdmin = true;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildAdminApp(); return;
  }
  const student = LMS_DATA.students.find(s => s.username===u && s.password===p);
  if (!student) { document.getElementById('login-error').style.display = 'flex'; return; }
  currentUser = student; isAdmin = false;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildStudentApp();
}

function doLogout() {
  currentUser=null; currentCourse=null; pageHistory=[]; quizScores={}; isAdmin=false;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').style.display='none';
}

/* ── ADMIN ── */
function buildAdminApp() {
  document.getElementById('sb-name').textContent = LMS_DATA.admin.name;
  document.getElementById('sb-role').innerHTML = `${icon('shield-check')} Administrator`;
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = `
    <div class="nav-label">Navigation</div>
    <div class="nav-item active" onclick="showAdminDashboard()">
      <span class="nav-icon">${icon('layout-dashboard')}</span> Dashboard
    </div>
    <div class="nav-label" style="margin-top:10px;">All Courses</div>
  `;
  LMS_DATA.courses.forEach((c,i) => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.innerHTML = `<span class="nav-icon">${icon(courseIcon(i))}</span> ${c.title}`;
    item.onclick = () => openCourse(c.id);
    nav.appendChild(item);
  });
  const now = new Date();
  document.getElementById('admin-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const ts=LMS_DATA.students.length, tc=LMS_DATA.courses.length;
  const te=LMS_DATA.students.reduce((a,s)=>a+s.enrolledCourses.length,0);
  document.getElementById('admin-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon-box">${icon('users')}</div><div class="stat-val">${ts}</div><div class="stat-lbl">Total Students</div></div>
    <div class="stat-card"><div class="stat-icon-box">${icon('book-open')}</div><div class="stat-val">${tc}</div><div class="stat-lbl">Total Courses</div></div>
    <div class="stat-card"><div class="stat-icon-box">${icon('graduation-cap')}</div><div class="stat-val">${te}</div><div class="stat-lbl">Total Enrollments</div></div>
  `;
  const cGrid = document.getElementById('admin-courses');
  cGrid.innerHTML = '';
  LMS_DATA.courses.forEach((c,i) => {
    const ec = LMS_DATA.students.filter(s=>s.enrolledCourses.includes(c.id)).length;
    const card = document.createElement('div');
    card.className = 'course-card fade-in';
    card.innerHTML = `
      <div class="course-card-header">
        <div class="course-icon-box">${icon(courseIcon(i))}</div>
        <div class="course-card-body"><h3>${c.title}</h3><p>${c.description}</p></div>
      </div>
      <div class="course-card-footer">
        <div class="course-meta">
          <span>${icon('folder')} ${c.days.length} sessions</span>
          <span>${icon('users')} ${ec} enrolled</span>
        </div>
        <span class="course-arrow">View ${icon('arrow-right')}</span>
      </div>
    `;
    card.onclick = () => openCourse(c.id);
    cGrid.appendChild(card);
  });
  buildStudentsTable();
  showPage('admin-dashboard','Admin Dashboard');
  render();
}

function buildStudentsTable(filter='') {
  const tbody = document.getElementById('students-tbody');
  tbody.innerHTML = '';
  LMS_DATA.students.filter(s =>
    s.name.toLowerCase().includes(filter.toLowerCase()) ||
    s.username.toLowerCase().includes(filter.toLowerCase())
  ).forEach(s => {
    const ec = LMS_DATA.courses.filter(c=>s.enrolledCourses.includes(c.id));
    const pills = ec.map(c=>`<span class="course-pill">${c.title}</span>`).join('');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="student-info">
          <div class="student-avatar">${icon('user')}</div>
          <div><div class="sname">${s.name}</div><div class="susername">@${s.username}</div></div>
        </div>
      </td>
      <td><div class="course-pills">${pills||`<span style="color:var(--text-3);font-size:.85rem;">No courses</span>`}</div></td>
      <td><span class="count-badge">${ec.length}</span></td>
    `;
    tbody.appendChild(tr);
  });
  render();
}

function filterStudents() { buildStudentsTable(document.getElementById('student-search').value); }
function showAdminDashboard() {
  showPage('admin-dashboard','Admin Dashboard');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('#sidebar-nav .nav-item')?.classList.add('active');
}

/* ── STUDENT ── */
function buildStudentApp() {
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').innerHTML = `${icon('user-check')} Student`;
  document.getElementById('dash-name').textContent = currentUser.name.split(' ')[0];
  const now = new Date();
  document.getElementById('dash-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const courses = LMS_DATA.courses.filter(c=>currentUser.enrolledCourses.includes(c.id));
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = `
    <div class="nav-label">Navigation</div>
    <div class="nav-item active" onclick="showStudentDashboard()">
      <span class="nav-icon">${icon('layout-dashboard')}</span> Dashboard
    </div>
    <div class="nav-label" style="margin-top:10px;">My Courses</div>
  `;
  courses.forEach((c,i) => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.innerHTML = `<span class="nav-icon">${icon(courseIcon(i))}</span> ${c.title}`;
    item.onclick = () => openCourse(c.id);
    nav.appendChild(item);
  });
  const td=courses.reduce((a,c)=>a+c.days.length,0);
  const tf=courses.reduce((a,c)=>a+c.days.reduce((b,d)=>b+d.files.length,0),0);
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon-box">${icon('book-open')}</div><div class="stat-val">${courses.length}</div><div class="stat-lbl">Enrolled Courses</div></div>
    <div class="stat-card"><div class="stat-icon-box">${icon('folder-open')}</div><div class="stat-val">${td}</div><div class="stat-lbl">Total Sessions</div></div>
    <div class="stat-card"><div class="stat-icon-box">${icon('file-text')}</div><div class="stat-val">${tf}</div><div class="stat-lbl">Learning Materials</div></div>
  `;
  const grid = document.getElementById('dash-courses');
  grid.innerHTML = '';
  courses.forEach((c,i) => {
    const card = document.createElement('div');
    card.className = 'course-card fade-in';
    card.innerHTML = `
      <div class="course-card-header">
        <div class="course-icon-box">${icon(courseIcon(i))}</div>
        <div class="course-card-body"><h3>${c.title}</h3><p>${c.description}</p></div>
      </div>
      <div class="course-card-footer">
        <div class="course-meta"><span>${icon('folder')} ${c.days.length} sessions</span></div>
        <span class="course-arrow">Open ${icon('arrow-right')}</span>
      </div>
    `;
    card.onclick = () => openCourse(c.id);
    grid.appendChild(card);
  });
  showPage('dashboard','Dashboard');
  render();
}

function showStudentDashboard() { showPage('dashboard','Dashboard'); }

/* ── NAV ── */
function showPage(name, title, crumb) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('topbar-title').textContent = title||name;
  document.getElementById('topbar-crumb').textContent = crumb||'';
  document.getElementById('topbar-back').classList.toggle('show', pageHistory.length>0);
  closeSidebar();
}
function pushPage(fn) { pageHistory.push(fn); }
function goBack() { if (!pageHistory.length) return; pageHistory.pop()(); }

/* ── COURSE ── */
function openCourse(courseId) {
  currentCourse = LMS_DATA.courses.find(c=>c.id===courseId);
  if (!currentCourse) return;
  const idx = LMS_DATA.courses.findIndex(c=>c.id===courseId);
  pushPage(()=>isAdmin?showPage('admin-dashboard','Admin Dashboard'):showPage('dashboard','Dashboard'));
  document.getElementById('course-hero').innerHTML = `
    <div class="course-big-icon">${icon(courseIcon(idx))}</div>
    <div class="course-hero-info">
      <h2>${currentCourse.title}</h2>
      <p>${currentCourse.description}</p>
      <div class="instructor">${icon('user')} ${currentCourse.instructor}</div>
    </div>
  `;
  buildDays(currentCourse);
  showPage('course', currentCourse.title);
  render();
}

/* ── BUILD DAYS ──────────────────────────────────────────────────
   KEY CHANGE: Files are filtered per-user using canAccessFile().
   • Students  → only see files they have access to;
                 days with zero visible files are hidden entirely.
   • Admins    → see all files; restricted ones show a small lock badge
                 so the admin knows who can see them.
   ────────────────────────────────────────────────────────────── */
function buildDays(course) {
  const container = document.getElementById('days-list');
  container.innerHTML = '';

  course.days.forEach((day, idx) => {

    // ── Filter files for the current viewer ──────────────────
    const visibleFiles = isAdmin
      ? day.files                                          // admin sees all
      : day.files.filter(f => canAccessFile(f, currentUser, false)); // student filter

    // Students: skip the entire day folder if nothing is visible
    if (!isAdmin && visibleFiles.length === 0) return;

    const dateStr = new Date(day.date).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});
    const folder  = document.createElement('div');
    folder.className = 'day-folder fade-in';
    folder.style.animationDelay = (idx * .06) + 's';

    folder.innerHTML = `
      <div class="day-folder-header" onclick="toggleFolder(this)">
        <div class="folder-icon-box">${icon('folder')}</div>
        <div class="folder-info">
          <h4>${day.title}</h4>
          <div class="folder-date">${icon('calendar')} ${dateStr}</div>
        </div>
        <div class="folder-meta">
          <span class="file-count">${visibleFiles.length} file${visibleFiles.length !== 1 ? 's' : ''}</span>
          <span class="folder-chevron">${icon('chevron-right')}</span>
        </div>
      </div>
      <div class="day-folder-body">
        <div class="file-list">
          ${visibleFiles.map(f => buildFileItem(f, course.id, day.id)).join('')}
        </div>
      </div>
    `;
    container.appendChild(folder);
  });
  render();
}

/* ── BUILD FILE ITEM ─────────────────────────────────────────────
   Admin view: if a file has access restrictions, show a small
   "🔒 s1, s2" badge so the admin can see who it's restricted to.
   Student view: no badge needed (they only see their own files).
   ────────────────────────────────────────────────────────────── */
function buildFileItem(file, courseId, dayId) {
  const fi     = FILE_ICONS[file.type] || 'file';
  const labels = { video:'Video', note:'Notes', link:'Link', pdf:'PDF', image:'Image' };

  // Admin: show lock badge when file has a restricted access list
  let restrictedBadge = '';
  if (isAdmin && file.access && file.access.length > 0) {
    restrictedBadge = `
      <span class="file-item-restricted">
        ${icon('lock')} ${file.access.join(', ')}
      </span>
    `;
  }

  return `
    <div class="file-item" onclick="openContent('${courseId}','${dayId}','${file.id}')">
      <div class="file-type-box">${icon(fi)}</div>
      <div class="file-item-info">
        <div class="fname">${file.title}${restrictedBadge}</div>
        <div class="fdesc">${file.description}</div>
      </div>
      <span class="file-item-badge">${file.duration || labels[file.type] || ''}</span>
    </div>
  `;
}

function toggleFolder(header) {
  const fold = header.parentElement;
  fold.classList.toggle('open');
  header.querySelector('.folder-icon-box').innerHTML = fold.classList.contains('open') ? icon('folder-open') : icon('folder');
  render();
}

/* ── CONTENT ── */
function openContent(courseId, dayId, fileId) {
  const course = LMS_DATA.courses.find(c=>c.id===courseId);
  const day    = course.days.find(d=>d.id===dayId);
  const file   = day.files.find(f=>f.id===fileId);

  // Extra safety: block students who somehow trigger a restricted file
  if (!isAdmin && !canAccessFile(file, currentUser, false)) return;

  pushPage(()=>openCourse(courseId));
  let body = '';
  if (file.type==='video') {
    body = `<div class="video-wrapper"><iframe src="${file.url}" frameborder="0" allowfullscreen></iframe></div>`;
  } else if (file.type==='note') {
    body = `<div class="note-body">${file.content}</div>`;
  } else if (file.type==='link') {
    body = `<div class="link-card"><div class="link-icon-wrap">${icon('link-2')}</div><p>${file.description}</p><button class="open-link-btn" onclick="window.open('${file.url}','_blank')">Open Link ${icon('external-link')}</button></div>`;
  }
  const fi = FILE_ICONS[file.type]||'file';
  document.getElementById('content-viewer').innerHTML = `
    <div class="content-title">${file.title}</div>
    <div class="content-meta">
      <span class="content-badge">${icon(fi)} ${file.type}</span>
      <span class="meta-item">${icon('folder')} ${day.title}</span>
      ${file.duration?`<span class="meta-item">${icon('clock')} ${file.duration}</span>`:''}
    </div>
    ${body}
  `;
  showPage('content', file.title, `${course.title} › ${day.title}`);
  render();
}

/* ── MOBILE ── */
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
</script>
</body>
</html>
